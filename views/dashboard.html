<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Your personal To-Do dashboard — add, complete, and manage tasks" />
    <title>Dashboard — Azure To-Do App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/public/style.css" />
</head>
<body class="dashboard-body">

    <!-- Subtle background orbs -->
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>

    <!-- ── Top Navigation Bar ─────────────────────────────────────────── -->
    <nav class="topbar" id="topbar">
        <div class="topbar__brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>
            <span>Azure To-Do</span>
        </div>

        <div class="topbar__user">
            <div class="avatar" id="user-avatar">?</div>
            <div class="user-info">
                <span class="user-name" id="user-name">Loading…</span>
                <span class="user-email" id="user-email"></span>
            </div>
            <a href="/auth/logout" class="btn-logout" id="btn-logout" title="Sign out">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </a>
        </div>
    </nav>

    <!-- ── Main Content ───────────────────────────────────────────────── -->
    <main class="dashboard">
        <!-- Stats row -->
        <section class="stats-row" id="stats-row">
            <div class="stat-card">
                <span class="stat-value" id="stat-total">0</span>
                <span class="stat-label">Total Tasks</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="stat-done">0</span>
                <span class="stat-label">Completed</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="stat-pending">0</span>
                <span class="stat-label">Pending</span>
            </div>
        </section>

        <!-- Add task form -->
        <form class="add-form" id="add-form" autocomplete="off">
            <input
                type="text"
                id="todo-input"
                class="add-input"
                placeholder="What needs to be done?"
                maxlength="200"
                required
            />
            <button type="submit" class="btn-add" id="btn-add">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Add
            </button>
        </form>

        <!-- Filter tabs -->
        <div class="filter-tabs" id="filter-tabs">
            <button class="filter-btn active" data-filter="all" id="filter-all">All</button>
            <button class="filter-btn" data-filter="pending" id="filter-pending">Pending</button>
            <button class="filter-btn" data-filter="completed" id="filter-completed">Completed</button>
        </div>

        <!-- Todo list -->
        <ul class="todo-list" id="todo-list">
            <!-- Items rendered by JS -->
        </ul>

        <p class="empty-state" id="empty-state">
            🎉 No tasks yet — add one above!
        </p>
    </main>

    <script src="/public/dashboard.js"></script>
</body>
</html>
